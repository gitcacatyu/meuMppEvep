<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PatyOn Fun MPP EVEP - Home</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    :root {
      --bg: radial-gradient(circle at top left, #07111f 0%, #0d1d3c 42%, #050c17 100%);
      --surface: rgba(255, 255, 255, 0.08);
      --text: #eef4ff;
      --muted: #9ab1d2;
      --accent: #5dd7ff;
      --button: linear-gradient(135deg, #5dd7ff, #4b8cff);
      --radius: 24px;
      --shadow: 0 24px 58px rgba(0, 0, 0, 0.28);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      display: flex;
      justify-content: center;
      padding: 32px 20px;
    }

    .container {
      width: min(100%, 760px);
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: var(--radius);
      padding: 32px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
      margin: 0 auto;
    }

    h1 {
      margin-bottom: 14px;
      font-size: clamp(2rem, 4vw, 2.6rem);
      letter-spacing: 0.03em;
    }

    p {
      color: var(--muted);
      margin-bottom: 26px;
      line-height: 1.7;
    }

    input,
    button {
      width: 100%;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 18px;
      padding: 16px 18px;
      font-size: 1rem;
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      outline: none;
      margin-bottom: 12px;
    }

    button {
      max-width: 240px;
      background: var(--button);
      color: #07111f;
      cursor: pointer;
      font-weight: 700;
      box-shadow: var(--shadow);
      transition: transform 0.2s ease, filter 0.2s ease;
    }

    button:hover {
      transform: translateY(-2px);
      filter: brightness(1.04);
    }

    .video-card {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 24px;
      padding: 22px;
      margin-top: 24px;
      box-shadow: var(--shadow);
    }

    iframe {
      border-radius: 20px;
      width: 100%;
      max-width: 100%;
    }

    .actions {
      margin-top: 16px;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 12px;
    }

    .actions button {
      width: auto;
      padding: 12px 16px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.10);
      color: var(--text);
    }

    .actions button:hover {
      background: rgba(255, 255, 255, 0.16);
    }

    .comentarios {
      margin-top: 18px;
      text-align: left;
    }

    .comentarios p {
      background: rgba(255, 255, 255, 0.09);
      padding: 12px 14px;
      border-radius: 16px;
      margin: 10px 0 0;
    }
  </style>
  <link rel="stylesheet" href="common.css">
</head>
<body>
  <div class="container">
    <h1>Olá, <span id="nomeUsuario"></span>! 👋</h1>
    <p>Adicione vídeos do TikTok abaixo:</p>

    <input type="text" id="tiktokLink" placeholder="Cole o link do TikTok aqui" />
    <br />
    <button onclick="addTikTok()">Adicionar Vídeo</button>

    <div id="tiktokVideos"></div>
  </div>

  <script>
    const nome = localStorage.getItem("nomeUsuario") || "Visitante";
    document.getElementById("nomeUsuario").textContent = nome;

    function addTikTok() {
      const link = document.getElementById("tiktokLink").value;
      if (!link.includes("tiktok.com")) {
        alert("Insira um link válido do TikTok.");
        return;
      }

      const embedLink = link.replace("/video/", "/embed/");
      const container = document.createElement("div");
      container.className = "video-card";

      container.innerHTML = `
        <iframe src="${embedLink}" width="325" height="580" allow="autoplay; encrypted-media"></iframe>
        <div class="actions">
          <button onclick="curtir(this)">❤️ Curtir (<span>0</span>)</button>
          <button onclick="comentar(this)">💬 Comentar</button>
          <button onclick="salvar()">💾 Salvar</button>
        </div>
        <div class="comentarios">
          <!-- Comentários aparecem aqui -->
        </div>
      `;

      document.getElementById("tiktokVideos").prepend(container);
      document.getElementById("tiktokLink").value = "";
    }

    function curtir(btn) {
      const span = btn.querySelector('span');
      let count = parseInt(span.textContent);
      span.textContent = ++count;
    }

    function comentar(btn) {
      const comentario = prompt("Digite seu comentário:");
      if (comentario) {
        const div = btn.closest(".video-card").querySelector(".comentarios");
        const p = document.createElement("p");
        p.textContent = `🗨️ ${comentario}`;
        div.appendChild(p);
      }
    }

    function salvar() {
      alert("Simulação: vídeo salvo na sua lista! 😉");
    }
  </script>
</body>
</html>
