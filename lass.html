<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro PassG</title>
  <link rel="stylesheet" href="common.css">
  <style>
    body {
      text-align: center;
      padding: 20px;
    }
    div {
      max-width: 400px;
      margin: auto;
      padding: 20px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 15px;
      backdrop-filter: blur(10px);
    }
    input {
      display: block;
      width: 90%;
      margin: 10px auto;
      padding: 10px;
      border: none;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.2);
      color: white;
    }
    nav {
      margin: 20px 0;
    }
  </style>

<body>
         <h1>PassG</h1>
         <p>Como novidade deixemos você aventurar!</p>
        <div>
            <p>Cadastro PassG</p>
            <nav>
             <input placeholder="Digite seu nome..." type="text">
             </nav>
             <nav>
                <p>Sua idade:</p>
                <input type="number">
             </nav>
             <nav>
                <p>Sua senha:</p>
                <input placeholder="Digite sua senha..." type="password">
             </nav>
        </div>
</body>
</html>
