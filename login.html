<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login</title>
  <style>
    :root {
      --bg: radial-gradient(circle at top left, #07111f 0%, #0b2038 42%, #050b18 100%);
      --surface: rgba(255, 255, 255, 0.1);
      --text: #eef4ff;
      --muted: #9ab1d2;
      --accent: #5dd7ff;
      --shadow: 0 24px 60px rgba(0, 0, 0, 0.28);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
    }

    .form-container {
      width: min(100%, 420px);
      background: var(--surface);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 32px;
      padding: 32px;
      box-shadow: var(--shadow);
    }

    h1,
    h3 {
      margin: 0 0 16px;
      text-align: center;
      color: #fff;
    }

    label {
      display: block;
      text-align: left;
      margin-top: 18px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    input,
    button {
      width: 100%;
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      padding: 14px 16px;
      font-size: 1rem;
      margin-top: 8px;
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      outline: none;
    }

    input:focus {
      border-color: rgba(93, 215, 255, 0.6);
      box-shadow: 0 0 24px rgba(93, 215, 255, 0.16);
    }

    .form-container button {
      margin-top: 22px;
      background: linear-gradient(135deg, #5dd7ff, #4b80ff);
      color: #07111f;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 18px 42px rgba(0, 0, 0, 0.22);
      transition: transform 0.2s ease, filter 0.2s ease;
    }

    .form-container button:hover {
      transform: translateY(-2px);
      filter: brightness(1.05);
    }

    .checkbox {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 16px;
      color: var(--text);
      font-size: 0.95rem;
    }

    #mensagem {
      margin-top: 18px;
      font-weight: 700;
      padding: 14px 16px;
      border-radius: 18px;
      display: none;
      width: 100%;
    }

    .sucesso {
      background-color: rgba(89, 214, 119, 0.16);
      color: #d4ffdc;
      border: 1px solid rgba(89, 214, 119, 0.35);
    }

    .erro {
      background-color: rgba(255, 57, 72, 0.16);
      color: #ffd6dc;
      border: 1px solid rgba(255, 57, 72, 0.35);
    }
  </style>
  <link rel="stylesheet" href="common.css">
</head>
<body>
  <h1>Login</h1>

  <div class="form-container">
    <h3>Entre com suas credenciais</h3>

    <label for="usuario">E-mail:</label><br>
    <input type="email" id="usuario" placeholder="Digite seu email">

    <label for="senha">Senha:</label><br>
<input type="password" id="senha" placeholder="Senha (mín. 6 caracteres)" title="A senha deve ter no mínimo 6 caracteres">

   
    <label class="checkbox">
      <input type="checkbox" id="lembrar"> Lembre-me
    </label><br>

    <button onclick="fazerLogin()">Entrar</button>

    <div style="text-align: center; margin-top: 20px;">
      <a href="cadras.html" style="color: var(--accent); text-decoration: none;">Não tem conta? Cadastre-se aqui</a>
    </div>

    <div id="mensagem"></div>
  </div>

  <script>
    // Quando a página carregar, checar se tem usuário salvo
    window.onload = function() {
      const usuarioSalvo = localStorage.getItem("usuarioSalvo");
      if (usuarioSalvo) {
        document.getElementById("usuario").value = usuarioSalvo;
        document.getElementById("lembrar").checked = true;
      }
    };
function fazerLogin() {
  const usuario = document.getElementById("usuario").value.trim();
  const senha = document.getElementById("senha").value.trim();
  const msg = document.getElementById("mensagem");

  msg.classList.remove("sucesso", "erro");

  // Verificar se há usuário cadastrado
  const usuarioCadastrado = localStorage.getItem('usuarioCadastrado');
  const senhaCadastrada = localStorage.getItem('usuarioSenha');
  const nomeCadastrado = localStorage.getItem('usuarioNome');

  // Verifica se o email é válido (simples, mas funcional)
  const emailValido = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(usuario);

  if (!usuario || !senha) {
    msg.textContent = "⚠️ Por favor, preencha todos os campos.";
    msg.className = "erro";
    msg.style.display = "block";
  } else if (!emailValido) {
    msg.textContent = "❌ O e-mail digitado não é válido.";
    msg.className = "erro";
    msg.style.display = "block";
  } else if (!usuarioCadastrado) {
    msg.textContent = "❌ Nenhum usuário cadastrado. Faça seu cadastro primeiro.";
    msg.className = "erro";
    msg.style.display = "block";
  } else if (senha === senhaCadastrada) {
    // Login bem-sucedido com qualquer email válido e a senha cadastrada
    msg.textContent = `✅ Login bem-sucedido! Bem-vindo, ${nomeCadastrado}!`;
    msg.className = "sucesso";
    msg.style.display = "block";

    // Salvar usuário no localStorage se "lembrar-me" estiver marcado
    if (document.getElementById("lembrar").checked) {
      localStorage.setItem("usuarioSalvo", usuario);
    } else {
      localStorage.removeItem("usuarioSalvo");
    }

    setTimeout(() => {
      location.href = "ji.html";
    }, 2000);
  } else {
    msg.textContent = "❌ Senha incorreta.";
    msg.className = "erro";
    msg.style.display = "block";
  }
}
 // Cria uma barreira no histórico
  history.pushState(null, null, location.href);
  history.pushState(null, null, location.href);

  window.addEventListener("popstate", function (event) {
    // Quando tentar voltar ou avançar, joga de volta pra frente
    history.pushState(null, null, location.href);
  });
  </script>
</body>
</html>
