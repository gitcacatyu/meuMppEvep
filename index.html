<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="shortcut icon" href="./logo.png" type="image/x-icon"  id="icon"/>
  <title>Welcome Mpp</title>
  <style>
    :root {
      --bg: radial-gradient(circle at top left, #07111f 0%, #0d1d3d 40%, #050c18 100%);
      --surface: rgba(255, 255, 255, 0.08);
      --text: #eef4ff;
      --muted: #94a8c5;
      --button: linear-gradient(135deg, #5dd7ff, #747bff);
      --button-text: #07111f;
      --shadow: 0 26px 60px rgba(0, 0, 0, 0.28);
      --radius: 28px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
    }

    .page-shell {
      width: min(100%, 760px);
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: var(--radius);
      padding: 38px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      text-align: center;
    }

    .icon {
      width: 120px;
      height: 120px;
      margin-bottom: 24px;
      border-radius: 50%;
      box-shadow: var(--shadow);
      border: 1px solid rgba(255,255,255,0.18);
    }

    h2,
    h4 {
      margin: 0;
      line-height: 1.3;
    }

    h2 + h4 {
      margin-top: 8px;
      opacity: 0.86;
    }

    .hero-text {
      margin-bottom: 28px;
      color: var(--text);
    }

    input[type="button"], button {
      border: none;
      border-radius: 999px;
      background: var(--button);
      color: var(--button-text);
      font-size: 1rem;
      padding: 14px 24px;
      margin: 10px 8px;
      box-shadow: 0 16px 30px rgba(0, 0, 0, 0.18);
      transition: transform 0.25s ease, filter 0.25s ease;
      cursor: pointer;
    }

    input[type="button"]:hover,
    button:hover {
      transform: translateY(-2px);
      filter: brightness(1.06);
    }

    .action-group {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      margin-bottom: 18px;
    }

    h6 {
      margin-top: 28px;
      font-style: italic;
      color: var(--muted);
    }
    h5 {
      margin: 8px 0;
      color: var(--muted);
    }

    footer {
      margin-top: 24px;
      color: rgba(238, 242, 255, 0.72);
      font-size: 0.95rem;
    }

    .dark-mode {
      --bg: radial-gradient(circle at top left, #02060f 0%, #060d1c 45%, #02070f 100%);
      --text: #eef4ff;
      --button: linear-gradient(135deg, #2f3fff, #48e4ff);
      --shadow: 0 26px 60px rgba(255, 255, 255, 0.06);
    }
  </style>
  <link rel="stylesheet" href="common.css">
  <script src="config.js"></script>
</head>
<body>

  <div class="page-shell">
                      
    <img src="./Mpp.Icon.png" alt="Mpp Icon" class="icon">
    <h2 class="hero-text">MPP <span class="subtitle">EVEP</span></h2>
    <h2 class="hero-text">Bem-vindo(a)!<br><br>Aqui tem tudo... menos você! 😜</h2>

    <h4>Venha cadastrar-se ou entrar:</h4>

    <div class="action-group">
      <input type="button" onclick="cadras()" value="Cadastrar-se / Entrar">
      <input type="button" onclick="voltar()" value="Sair / Deslogar">
    </div>
    <br>
    <button id="toggleBtn" onclick="toggleDark()">🌙 Modo Escuro</button>
    <button id="notifyBtn" onclick="pedirNotificacao()" style="display:none;">🔔 Ativar Notificações</button>

    <h6>Em desenvolvimento...</h6>
    <h5>Version 6.0.1</h5>
    <footer><h5>@EVEP MPP da EVEP</h5></footer>
  </div>

  <script>
    function cadras() {
      // Simula login
      localStorage.setItem('logado', 'true');
      alert('Opa, você saiu da sua conta!');
      location.href = "verifica.html";
    }

    function voltar() {
      // Desloga
      localStorage.removeItem('logado');
      alert('Você foi deslogado!');
      location.href = "tris.html";
    }

    function toggleDark() {
      const body = document.body;
      const btn = document.getElementById("toggleBtn");

      body.classList.toggle("dark-mode");

      if (body.classList.contains("dark-mode")) {
        btn.textContent = "☀️ Modo Claro";
        localStorage.setItem('modo', 'dark');
      } else {
        btn.textContent = "🌙 Modo Escuro";
        localStorage.setItem('modo', 'light');
      }
    }

    function pedirNotificacao() {
      if (!('Notification' in window)) {
        alert('Seu navegador não suporta notificações.');
        return;
      }

      Notification.requestPermission().then(permission => {
        if (permission === 'granted') {
          localStorage.setItem('notificacao', 'true');
          if (window.mppConfig) {
            window.mppConfig.setConfig('notificacao', true);
            window.mppConfig.mostrarNotificacao('Notificações ativadas! Lembretes habilitados.');
          } else {
            alert('Notificações ativadas!');
          }
        } else {
          alert('Permissão negada. Para receber notificações, permita no navegador.');
        }
      });
    }

    function mostrarLembreteNotificacao() {
      if (!('Notification' in window)) return;
      if (Notification.permission !== 'granted') return;
      if (window.mppConfig && window.mppConfig.getConfig('notificacao')) {
        window.mppConfig.mostrarNotificacao('Entre no site e mexa nele!');
      }
    }

    function atualizarBotaoNotificacao() {
      const btn = document.getElementById('notifyBtn');
      if (!btn) return;
      if (!('Notification' in window)) {
        btn.style.display = 'none';
        return;
      }
      btn.style.display = 'inline-block';
      if (Notification.permission === 'granted') {
        btn.textContent = '🔔 Notificações Ativadas';
        btn.disabled = true;
      } else {
        btn.textContent = '🔔 Ativar Notificações';
        btn.disabled = false;
      }
    }

    window.onload = () => {
      const modoSalvo = localStorage.getItem('modo');
      const logado = localStorage.getItem('logado');

      // Aplica modo escuro salvo
      if (modoSalvo === 'dark') {
        document.body.classList.add('dark-mode');
        document.getElementById('toggleBtn').textContent = '☀️ Modo Claro';
      }

      // Redireciona se estiver logado
      if (logado === 'true') {
        window.location.href = 'ji.html';
      }

      atualizarBotaoNotificacao();
      setTimeout(mostrarLembreteNotificacao, 3000);
    };

     // Cria uma barreira no histórico
  history.pushState(null, null, location.href);
  history.pushState(null, null, location.href);

  window.addEventListener("popstate", function (event) {
    // Quando tentar voltar ou avançar, joga de volta pra frente
    history.pushState(null, null, location.href);
  });
    
  </script>

</body>
</html>
