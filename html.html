<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="oio.css">
  <title>Editor HTML + CSS Simples</title>
  <link rel="stylesheet" href="common.css">
</head>
<body>
  <button class="home-button" onclick="location.href='ji.html'">🏠 Home</button>
  <div class="app-shell">
    <div class="editor-container">
      <label class="label">HTML</label>
      <textarea id="htmlCode" spellcheck="false"><h1>Olá, Mundo!</h1></textarea>

      <label class="label">CSS</label>
      <textarea id="cssCode">body { background: #222; color: #eee; }</textarea>

      <label class="label">JavaScript</label>
      <textarea id="jsCode">console.log('Rodando JS!');</textarea>
    </div>

    <iframe id="preview" sandbox="allow-scripts"></iframe>
  </div>

  <script src="pot.js"></script>
</body>
</html>
