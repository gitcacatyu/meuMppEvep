  <script>
// Lista de anúncios
const anuncios = [
    {
        id: "docenet",
        titulo: "Promoção da DoceNet!",
        img: "chatanun.png",
        link: "anun.html"
    },
    {
        id: "cupsGratis",
        titulo: "Ganhe CUPS grátis!",
        img: "hatanun.png",
        link: "anun.html"
    },
     {
        id: "ceekemCurso",
        titulo: "Venha fazer cursos!",
        img: "eithcee.png",
        link: "anun.html"
    },
     {
        id: "jacare",
        titulo: "Pedaços de Arrays JS!",
        img: "eijaa.png",
        link: "anun.html"
    }
  ]

// Recupera os cliques do localStorage
let cliques = JSON.parse(localStorage.getItem("cliquesAnuncios") || "{}");

// Inicializa contagem se não existir
anuncios.forEach(anuncio => {
    if (!cliques[anuncio.id]) {
        cliques[anuncio.id] = 0;
    }
});

const imgEl = document.getElementById("imgAnuncio");
const linkEl = document.getElementById("linkAnuncio");
const tituloEl = document.getElementById("tituloAnuncio");
const cliquesEl = document.getElementById("cliquesAnuncio");

let index = 0;

function mostrarAnuncio() {
    const anuncio = anuncios[index];
    imgEl.src = anuncio.img;
    linkEl.href = anuncio.link;
    tituloEl.innerText = anuncio.titulo;
    cliquesEl.innerText = `Cliques: ${cliques[anuncio.id]}`;

    // Quando clicar no link, conta clique e salva
    linkEl.onclick = () => {
        cliques[anuncio.id]++;
        localStorage.setItem("cliquesAnuncios", JSON.stringify(cliques));
        cliquesEl.innerText = `Cliques: ${cliques[anuncio.id]}`;
    };

    index = (index + 1) % anuncios.length; // Loop infinito
}

// Mostra o primeiro anúncio e troca a cada 10s
mostrarAnuncio();
setInterval(mostrarAnuncio, 10000);
</script>

  <script>
    // Função para verificar as moedas
    function verificarMoedas() {
      const moedas = parseInt(localStorage.getItem("moedas") || "0"); // Verifica se tem moedas no localStorage
      return moedas;
    }

    // Função para atualizar as moedas na tela
    function atualizarMoedas() {
      const moedas = verificarMoedas();
      document.getElementById("moedasDisplay").innerText = moedas;
    }

    // Função para bloquear os dragões com passe, se o jogador tiver menos de 420 moedas
    function bloquearDragões() {
      let moedas = verificarMoedas();

      const dragõesPasse = [
        "DragonApelao", 
        "DragonFORTE", 
        "DragonLendario", 
        "DragonXavier"
      ];

      [ "player1-select", "player2-select" ].forEach(id => {
        const select = document.getElementById(id);
        Array.from(select.options).forEach(opt => {
          const passeAtivo = localStorage.getItem("passeAtivo") === "true";

          if (dragõesPasse.includes(opt.value) && !passeAtivo) {
           opt.disabled = true;
            opt.text += " (Bloqueado - Passe)";
           }
        });
      });
    }

    // Função para adicionar moedas depois de uma luta
    function fimDaLuta(vencedor) {
      let ganho = vencedor === "player1" ? 50 : 30; // Exemplo de ganho de moedas
      let moedas = verificarMoedas();
      moedas += ganho;
      localStorage.setItem("coins", moedas);
      atualizarMoedas(); // Atualiza as moedas na tela
      alert(`Você ganhou ${ganho} moedas! Total: ${moedas}`);
    }
 
    // Inicia a função de bloqueio de dragões e mostra as moedas
    window.onload = () => {
      bloquearDragões();
      atualizarMoedas(); // Atualiza as moedas ao carregar a página
    };

    // Quando o jogador clicar para começar a luta, armazena as escolhas e vai para a página de luta
    document.getElementById("startBtn").addEventListener("click", () => {
      const p1 = document.getElementById("player1-select").value;
      const p2 = document.getElementById("player2-select").value;

      // Guarda as escolhas no localStorage
      localStorage.setItem("player1", p1);
      localStorage.setItem("player2", p2);

      // Redireciona para a página de luta
      window.location.href = "fight.html";
    });
    document.addEventListener('DOMContentLoaded', () => {
  const botao = document.getElementById('startBtn');
  if (botao) {
    botao.addEventListener('click', () => {
      document.getElementById('musicaLut').play();
    });
  }
});
  </script>
